<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#F97316" stop-opacity="1"/>
      <stop offset="0.62" stop-color="#06B6D4" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="orangeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (for preview only; remove if needed) -->
  <rect width="1200" height="420" fill="#06080D"/>

  <!-- Projector beam line (signature) -->
  <rect x="120" y="190" width="960" height="4" fill="url(#beam)" opacity="0.95" filter="url(#softGlow)"/>

  <!-- Wordmark -->
  <g id="wordmark_orange_on_dark">
    <text x="120" y="185" font-family="DM Serif Display, Georgia, serif" font-size="150" font-weight="400"
          fill="url(#orangeGlow)" letter-spacing="-2">MISEN</text>
    <text x="125" y="255" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="500"
          fill="#94A3B8" letter-spacing="2">MISE EN SCÈNE NUMÉRIQUE</text>
  </g>

  <!-- Mono variants (hidden by default; use in exports) -->
  <g id="wordmark_mono_white" opacity="0">
    <text x="120" y="185" font-family="DM Serif Display, Georgia, serif" font-size="150" font-weight="400"
          fill="#F8FAFC" letter-spacing="-2">MISEN</text>
  </g>

  <g id="wordmark_mono_black" opacity="0">
    <rect width="1200" height="420" fill="#ffffff"/>
    <text x="120" y="185" font-family="DM Serif Display, Georgia, serif" font-size="150" font-weight="400"
          fill="#000000" letter-spacing="-2">MISEN</text>
  </g>

  <!-- Safe-area guide (optional) -->
  <g id="safe_area" opacity="0.18">
    <rect x="60" y="60" width="1080" height="300" rx="24" fill="none" stroke="#252B3B" stroke-width="2"/>
  </g>
</svg>
